server:
  port: 8082

spring:
  application:
    name: contract-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/contract_db}
    username: ${SPRING_DATASOURCE_USERNAME:cms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cms_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Service URLs
collaborator:
  service:
    url: ${COLLABORATOR_SERVICE_URL:http://localhost:8081}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}

# Contract expiry notification settings
contract:
  expiry:
    notification:
      enabled: true
      days-before: 30
      cron: "0 0 8 * * *"
    update:
      cron: "0 0 0 * * *"

logging:
  level:
    root: INFO
    com.cms.contract: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
